  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #fafaf5; --white: #fff;
      --gold: #c9a84c; --gold-light: #e8cc7a; --gold-dark: #a0782a;
      --sky: #4a90d9; --sky-dark: #2c6fad; --sky-light: #7ab8f0;
      --text: #1a1a2e; --text-muted: #6b7280;
      --border: #e8e0d0;
      --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
    }
    html, body { height: 100%; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* BG */
    .bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .bg::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 70% 50% at 20% 10%, rgba(74,144,217,0.07) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 80%, rgba(201,168,76,0.09) 0%, transparent 60%); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes popIn { 0% { transform:scale(0.85); opacity:0; } 100% { transform:scale(1); opacity:1; } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
    @keyframes pulse-dot { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)} 50%{box-shadow:0 0 0 5px rgba(34,197,94,0)} }
    @keyframes timerPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    @keyframes correctFlash { 0%{background:rgba(34,197,94,0.12)} 100%{background:transparent} }
    @keyframes wrongFlash { 0%{background:rgba(239,68,68,0.12)} 100%{background:transparent} }
    @keyframes scoreUp { 0%{opacity:0;transform:translateY(0) scale(1.3)} 60%{opacity:1} 100%{opacity:0;transform:translateY(-40px) scale(1)} }
    @keyframes spinPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.15);opacity:0.7} }

    /* HEADER */
    header { position: relative; z-index: 10; display:flex; align-items:center; justify-content:space-between; padding:16px 40px; border-bottom:1px solid rgba(201,168,76,0.18); background:rgba(250,250,245,0.9); backdrop-filter:blur(14px); }
    .logo { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:700; color:var(--text); text-decoration:none; display:flex; align-items:center; gap:8px; }
    .logo-icon { width:30px; height:30px; background:linear-gradient(135deg,var(--gold),var(--gold-light)); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:15px; }
    .logo span { color:var(--sky); }
    .header-center { display:flex; align-items:center; gap:10px; }
    .game-badge { font-size:0.8rem; font-weight:600; background:rgba(74,144,217,0.1); color:var(--sky-dark); padding:6px 14px; border-radius:10px; border:1px solid rgba(74,144,217,0.2); }
    .room-badge { font-family:'Cormorant Garamond',serif; font-size:1rem; font-weight:700; color:var(--gold-dark); background:rgba(201,168,76,0.08); padding:6px 14px; border-radius:10px; border:1px solid rgba(201,168,76,0.2); letter-spacing:0.1em; }
    .header-right { display:flex; align-items:center; gap:10px; }
    .quit-btn { font-size:0.8rem; font-weight:500; color:var(--text-muted); background:none; border:1.5px solid var(--border); padding:7px 14px; border-radius:9px; cursor:pointer; text-decoration:none; transition:all 0.2s; }
    .quit-btn:hover { color:var(--red); border-color:rgba(239,68,68,0.4); }

    /* MAIN LAYOUT */
    .game-wrap { position:relative; z-index:5; max-width:900px; margin:0 auto; padding:32px 24px 60px; }

    /* SCOREBOARD */
    .scoreboard { display:flex; gap:10px; margin-bottom:28px; flex-wrap:wrap; animation:fadeDown 0.5s ease both; }
    .score-card { flex:1; min-width:100px; background:var(--white); border:1px solid var(--border); border-radius:14px; padding:12px 14px; text-align:center; position:relative; overflow:hidden; transition:all 0.3s; }
    .score-card.me { border-color:rgba(74,144,217,0.4); box-shadow:0 0 0 3px rgba(74,144,217,0.08); }
    .score-card.leading { border-color:rgba(201,168,76,0.5); box-shadow:0 0 0 3px rgba(201,168,76,0.1); }
    .score-card.leading::before { content:'👑'; position:absolute; top:4px; right:6px; font-size:12px; }
    .sc-avatar { font-size:20px; margin-bottom:4px; }
    .sc-name { font-size:0.78rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sc-name .me-tag { font-size:0.62rem; color:var(--sky-dark); background:rgba(74,144,217,0.1); padding:1px 5px; border-radius:4px; margin-left:3px; }
    .sc-score { font-family:'Cormorant Garamond',serif; font-size:1.7rem; font-weight:700; color:var(--text); line-height:1; margin-top:4px; }
    .sc-score.flash-up { animation:scoreFlash 0.4s ease; }
    @keyframes scoreFlash { 0%{color:var(--green);transform:scale(1.2)} 100%{color:var(--text);transform:scale(1)} }
    .score-delta { position:absolute; top:8px; left:50%; transform:translateX(-50%); font-size:1rem; font-weight:700; color:var(--green); pointer-events:none; animation:scoreUp 1.2s ease forwards; }

    /* QUESTION ZONE */
    .question-zone { background:var(--white); border:1px solid var(--border); border-radius:24px; padding:36px 40px; margin-bottom:20px; position:relative; overflow:hidden; animation:fadeUp 0.5s 0.1s ease both; }
    .question-zone::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--sky),var(--gold),var(--sky-light)); }
    .question-zone.correct { animation:correctFlash 0.8s ease; }
    .question-zone.wrong { animation:wrongFlash 0.8s ease, shake 0.4s ease; }

    .q-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:10px; }
    .q-progress { display:flex; align-items:center; gap:10px; }
    .q-num { font-size:0.78rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); }
    .progress-bar { width:140px; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,var(--sky),var(--sky-light)); border-radius:3px; transition:width 0.5s ease; }
    .q-category { font-size:0.72rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; background:rgba(201,168,76,0.1); color:var(--gold-dark); border:1px solid rgba(201,168,76,0.2); padding:4px 12px; border-radius:8px; }

    .timer-wrap { display:flex; align-items:center; gap:8px; }
    .timer-num { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:700; color:var(--text); line-height:1; min-width:36px; text-align:center; transition:color 0.3s; }
    .timer-num.urgent { color:var(--red); animation:timerPulse 0.5s ease infinite; }
    .timer-ring { width:36px; height:36px; transform:rotate(-90deg); }
    .timer-ring circle { fill:none; stroke-width:3; }
    .timer-bg { stroke:var(--border); }
    .timer-fg { stroke:var(--sky); stroke-linecap:round; transition:stroke-dashoffset 1s linear, stroke 0.3s; }
    .timer-fg.urgent { stroke:var(--red); }

    .question-text { font-family:'Cormorant Garamond',serif; font-size:clamp(1.4rem,3vw,1.85rem); font-weight:600; color:var(--text); line-height:1.4; margin-bottom:32px; }

    /* OPTIONS */
    .options-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .option-btn {
      padding:16px 20px; font-family:'DM Sans',sans-serif; font-size:0.92rem; font-weight:500;
      border:1.5px solid var(--border); border-radius:14px; background:var(--cream);
      color:var(--text); cursor:pointer; text-align:left; transition:all 0.2s;
      display:flex; align-items:center; gap:12px; line-height:1.35;
      animation:popIn 0.35s ease both;
    }
    .option-btn:nth-child(1){animation-delay:0.05s} .option-btn:nth-child(2){animation-delay:0.1s} .option-btn:nth-child(3){animation-delay:0.15s} .option-btn:nth-child(4){animation-delay:0.2s}
    .option-btn:hover:not(:disabled) { border-color:var(--sky); background:rgba(74,144,217,0.05); transform:translateY(-2px); box-shadow:0 4px 14px rgba(74,144,217,0.12); }
    .option-btn:disabled { cursor:default; }
    .option-btn.selected { border-color:var(--sky); background:rgba(74,144,217,0.08); }
    .option-btn.correct { border-color:var(--green) !important; background:rgba(34,197,94,0.08) !important; color:#15803d; font-weight:600; }
    .option-btn.wrong { border-color:var(--red) !important; background:rgba(239,68,68,0.08) !important; color:#b91c1c; }
    .option-letter { width:30px; height:30px; border-radius:8px; background:rgba(74,144,217,0.1); color:var(--sky-dark); font-size:0.82rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; }
    .option-btn.correct .option-letter { background:rgba(34,197,94,0.15); color:#15803d; }
    .option-btn.wrong .option-letter { background:rgba(239,68,68,0.12); color:#b91c1c; }
    .option-btn.selected .option-letter { background:rgba(74,144,217,0.18); }

    /* ANSWERED PLAYERS */
    .answered-row { display:flex; align-items:center; gap:6px; margin-top:16px; flex-wrap:wrap; }
    .answered-label { font-size:0.75rem; color:var(--text-muted); font-weight:500; }
    .answered-avatar { font-size:16px; width:28px; height:28px; border-radius:7px; background:rgba(34,197,94,0.1); border:1.5px solid rgba(34,197,94,0.3); display:flex; align-items:center; justify-content:center; animation:popIn 0.3s ease both; }

    /* WAITING / RESULT BANNER */
    .result-banner { background:var(--white); border:1px solid var(--border); border-radius:16px; padding:20px 28px; display:flex; align-items:center; gap:16px; margin-bottom:20px; animation:fadeUp 0.4s ease both; }
    .result-banner.hidden { display:none; }
    .rb-icon { font-size:2rem; flex-shrink:0; }
    .rb-text { flex:1; }
    .rb-title { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:700; color:var(--text); }
    .rb-sub { font-size:0.82rem; color:var(--text-muted); margin-top:2px; }
    .rb-points { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:700; }
    .rb-points.pos { color:var(--green); }
    .rb-points.neg { color:var(--red); }

    /* PODIUM FINAL */
    .podium-overlay { position:fixed; inset:0; z-index:200; background:rgba(250,250,245,0.97); backdrop-filter:blur(12px); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; opacity:0; pointer-events:none; transition:opacity 0.5s; padding:24px; }
    .podium-overlay.active { opacity:1; pointer-events:all; }
    .podium-title { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,5vw,3.2rem); font-weight:700; color:var(--text); text-align:center; }
    .podium-title span { color:var(--gold); }
    .podium-verse { font-family:'Cormorant Garamond',serif; font-size:1rem; font-style:italic; color:var(--text-muted); text-align:center; max-width:440px; }
    .podium-grid { display:flex; gap:14px; align-items:flex-end; justify-content:center; flex-wrap:wrap; }
    .podium-card { background:var(--white); border:1px solid var(--border); border-radius:18px; padding:20px 16px; text-align:center; min-width:110px; animation:popIn 0.5s ease both; position:relative; }
    .podium-card.p1 { border-color:rgba(201,168,76,0.5); box-shadow:0 0 0 3px rgba(201,168,76,0.15); order:-1; }
    .podium-card.p2 { order:0; }
    .podium-card.p3 { order:1; }
    .podium-rank { font-size:1.6rem; margin-bottom:6px; }
    .podium-av { font-size:2rem; margin-bottom:6px; }
    .podium-name { font-size:0.88rem; font-weight:600; color:var(--text); margin-bottom:4px; }
    .podium-score { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:700; color:var(--sky); }
    .podium-score.gold { color:var(--gold); }
    .podium-actions { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
    .btn-replay { padding:13px 32px; font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:600; border:none; cursor:pointer; border-radius:13px; background:linear-gradient(135deg,var(--sky),var(--sky-dark)); color:white; letter-spacing:0.04em; box-shadow:0 4px 18px rgba(74,144,217,0.3); transition:all 0.25s; }
    .btn-replay:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(74,144,217,0.38); }
    .btn-lobby { padding:13px 32px; font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:600; border:1.5px solid var(--border); cursor:pointer; border-radius:13px; background:transparent; color:var(--text-muted); transition:all 0.25s; text-decoration:none; display:inline-flex; align-items:center; }
    .btn-lobby:hover { border-color:var(--sky-light); color:var(--sky-dark); }

    /* WAITING SCREEN */
    .waiting-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:20px; animation:fadeUp 0.5s ease both; }
    .waiting-cross { font-size:3rem; animation:spinPulse 1.8s ease-in-out infinite; }
    .waiting-title { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:700; color:var(--text); }
    .waiting-sub { font-size:0.85rem; color:var(--text-muted); }

    /* TOAST */
    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--text); color:white; padding:11px 22px; border-radius:11px; font-size:0.86rem; font-weight:500; box-shadow:0 8px 30px rgba(0,0,0,0.2); z-index:100; opacity:0; transition:all 0.3s; pointer-events:none; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.success { background:#15803d; }
    .toast.error { background:#b91c1c; }
    .toast.info { background:var(--sky-dark); }

    @media(max-width:600px) {
      header { padding:12px 16px; } .header-center { display:none; }
      .question-zone { padding:24px 20px; }
      .options-grid { grid-template-columns:1fr; }
      .game-wrap { padding:20px 14px 40px; }
    }
  </style>
</head>

</div>

<!-- Podium final -->
<div class="podium-overlay" id="podium-overlay">

</div>

<div class="toast" id="toast"></div>

const LETTERS = ['A','B','C','D'];
const QUESTION_TIME = 15; // secondes par question
const POINTS_FAST = 100;
const POINTS_SLOW = 50;
const TOTAL_QUESTIONS = 12;

// ───────────────────────────────────────────────
// STATE
// ───────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const roomCode = params.get('code') || '';
let playerData = {};
try { playerData = JSON.parse(sessionStorage.getItem('bp_player') || '{}'); } catch(e) {}
const mySessionId = playerData.sessionId || sessionStorage.getItem('bp_session') || '';
const isHost = playerData.role === 'host';

document.getElementById('h-room-code').textContent = roomCode;
const backLobbyEl = document.getElementById('back-lobby');
if(backLobbyEl) backLobbyEl.href = `lobby.html?code=${roomCode}`;

let players = [];       // liste joueurs depuis Supabase
let scores = {};        // { session_id: score }
let currentQ = 0;       // index question courante (0-based)
let questions = [];     // questions mélangées par l'hôte, reçues par les invités
let answered = false;   // a-t-on répondu cette question ?
let answeredPlayers = []; // session_ids qui ont répondu cette question
let timerVal = QUESTION_TIME;
let timerInterval = null;
let gameChannel = null;
let myPlayer = null;
let nextTriggered = false; // évite le double-déclenchement de nextQuestion

// ───────────────────────────────────────────────
// INIT
// ───────────────────────────────────────────────
async function init() {
  if (!roomCode) { window.location.href = 'index.html'; return; }

  // Charger les joueurs
  const { data: pData } = await db.from('players').select('*').eq('room_code', roomCode).order('joined_at');
  players = pData || [];
  myPlayer = players.find(p => p.session_id === mySessionId);

  // Initialiser les scores
  players.forEach(p => { scores[p.session_id] = 0; });

  // Seul l'hôte mélange les questions — les invités reçoivent chaque question via broadcast
  if (isHost) {
    questions = shuffleArray([...ALL_QUESTIONS]).slice(0, TOTAL_QUESTIONS);
  }

  // Channel temps réel
  gameChannel = db.channel(`game-${roomCode}`)
    .on('broadcast', { event: 'answer' }, ({ payload }) => {
      handleRemoteAnswer(payload);
    })
    .on('broadcast', { event: 'load_question' }, ({ payload }) => {
      // Invités : stocker et afficher la question reçue depuis l'hôte
      if (!isHost) {
        questions[payload.index] = payload.question;
        loadQuestion(payload.index);
      }
    })
    .on('broadcast', { event: 'game_over' }, ({ payload }) => {
      showPodium(payload.scores);
    })
    .subscribe();

  // Afficher l'écran de jeu
  document.getElementById('waiting-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';

  renderScoreboard();

  // L'hôte envoie la première question à tous (y compris lui-même)
  if (isHost) {
    setTimeout(() => broadcastQuestion(0), 400);
  }
  // Les invités attendent le broadcast 'load_question'
}

// ───────────────────────────────────────────────
// QUESTION
// ───────────────────────────────────────────────
function loadQuestion(index) {
  currentQ = index;
  answered = false;
  answeredPlayers = [];
  nextTriggered = false;

  const q = questions[index];
  if (!q) { endGame(); return; }

  // Reset UI
  document.getElementById('result-banner').classList.add('hidden');
  const qZone = document.getElementById('question-zone');
  qZone.className = 'question-zone';

  document.getElementById('q-num').textContent = `Question ${index + 1} / ${TOTAL_QUESTIONS}`;
  document.getElementById('progress-fill').style.width = `${((index + 1) / TOTAL_QUESTIONS) * 100}%`;
  document.getElementById('q-category').textContent = q.cat;
  document.getElementById('question-text').textContent = q.q;

  // Options
  const grid = document.getElementById('options-grid');
  grid.innerHTML = q.opts.map((opt, i) => `
    <button class="option-btn" data-idx="${i}" onclick="selectAnswer(${i})">
      <span class="option-letter">${LETTERS[i]}</span>
      ${opt}
    </button>
  `).join('');

  // Answered row
  document.getElementById('answered-row').innerHTML = '<span class="answered-label">A répondu :</span>';

  startTimer();
}

// ───────────────────────────────────────────────
// TIMER
// ───────────────────────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  timerVal = QUESTION_TIME;
  updateTimerUI(timerVal);

  timerInterval = setInterval(() => {
    timerVal--;
    updateTimerUI(timerVal);
    if (timerVal <= 0) {
      clearInterval(timerInterval);
      if (!answered) timeOut();
      // L'hôte force la question suivante après expiration du timer
      // couvre le cas où certains joueurs n'ont pas répondu du tout
      if (isHost && !nextTriggered) {
        setTimeout(() => nextQuestion(), 2400);
      }
    }
  }, 1000);
}

function updateTimerUI(val) {
  const numEl = document.getElementById('timer-num');
  const circle = document.getElementById('timer-circle');
  numEl.textContent = val;
  numEl.classList.toggle('urgent', val <= 5);
  circle.classList.toggle('urgent', val <= 5);
  const pct = (val / QUESTION_TIME) * 100;
  circle.style.strokeDashoffset = 100 - pct;
}

// ───────────────────────────────────────────────
// RÉPONDRE
// ───────────────────────────────────────────────
function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  const q = questions[currentQ];
  const correct = idx === q.ans;
  const timeBonus = timerVal > 8 ? POINTS_FAST : POINTS_SLOW;
  const points = correct ? timeBonus : 0;

  // Broadcast aux autres
  gameChannel.send({
    type: 'broadcast',
    event: 'answer',
    payload: { session_id: mySessionId, answer_idx: idx, correct, points, question_idx: currentQ }
  });

  // Appliquer localement
  applyAnswer(mySessionId, idx, correct, points, true);
}

function handleRemoteAnswer(payload) {
  if (payload.question_idx !== currentQ) return;
  if (payload.session_id === mySessionId) return;
  applyAnswer(payload.session_id, payload.answer_idx, payload.correct, payload.points, false);
}

function applyAnswer(sessionId, answerIdx, correct, points, isMe) {
  // Marquer joueur comme ayant répondu
  if (!answeredPlayers.includes(sessionId)) {
    answeredPlayers.push(sessionId);
    const p = players.find(x => x.session_id === sessionId);
    if (p) {
      const row = document.getElementById('answered-row');
      const av = document.createElement('div');
      av.className = 'answered-avatar';
      av.title = p.pseudo;
      av.textContent = p.avatar;
      row.appendChild(av);
    }
  }

  // Update score
  if (points > 0) {
    scores[sessionId] = (scores[sessionId] || 0) + points;
    renderScoreboard(sessionId);
  }

  if (isMe) {
    showAnswerFeedback(answerIdx, correct, points);
  }

  // Si tout le monde a répondu → hôte passe à la suivante
  // On attend un court délai pour laisser les joueurs voir le feedback
  if (isHost && answeredPlayers.length >= players.length && !nextTriggered) {
    clearInterval(timerInterval);
    setTimeout(() => nextQuestion(), 2400);
  }
}

function showAnswerFeedback(answerIdx, correct, points) {
  const q = questions[currentQ];
  const btns = document.querySelectorAll('.option-btn');

  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === answerIdx && !correct) btn.classList.add('wrong');
  });

  const qZone = document.getElementById('question-zone');
  qZone.className = 'question-zone ' + (correct ? 'correct' : 'wrong');

  const banner = document.getElementById('result-banner');
  banner.classList.remove('hidden');
  document.getElementById('rb-icon').textContent = correct ? '✓' : '✗';
  document.getElementById('rb-title').textContent = correct ? 'Bonne réponse ! 🎉' : 'Mauvaise réponse…';
  document.getElementById('rb-sub').textContent = correct
    ? `La prochaine question arrive…`
    : `La bonne réponse était : ${q.opts[q.ans]}`;
  const pts = document.getElementById('rb-points');
  pts.textContent = correct ? `+${points}` : '0 pt';
  pts.className = 'rb-points ' + (correct ? 'pos' : 'neg');
}

function timeOut() {
  if (answered) return;
  answered = true;

  // Broadcast timeout
  gameChannel.send({ type:'broadcast', event:'answer', payload:{ session_id:mySessionId, answer_idx:-1, correct:false, points:0, question_idx:currentQ } });
  applyAnswer(mySessionId, -1, false, 0, true);
  showToast('⏰ Temps écoulé !', 'error');
}

// ───────────────────────────────────────────────
// DIFFUSER UNE QUESTION (hôte uniquement)
// ───────────────────────────────────────────────
function broadcastQuestion(index) {
  const q = questions[index];
  if (!q) { endGame(); return; }
  // Envoyer la question complète à tous les joueurs (y compris l'hôte lui-même)
  gameChannel.send({
    type: 'broadcast',
    event: 'load_question',
    payload: { index, question: q }
  });
  // L'hôte charge aussi la question localement
  loadQuestion(index);
}

// ───────────────────────────────────────────────
// QUESTION SUIVANTE (hôte uniquement)
// ───────────────────────────────────────────────
function nextQuestion() {
  if (nextTriggered) return; // empêcher le double-déclenchement
  nextTriggered = true;
  clearInterval(timerInterval);
  const next = currentQ + 1;
  if (next >= TOTAL_QUESTIONS) {
    endGame();
    return;
  }
  broadcastQuestion(next);
}

// ───────────────────────────────────────────────
// FIN DE PARTIE
// ───────────────────────────────────────────────
function endGame() {
  if (isHost) {
    gameChannel.send({ type:'broadcast', event:'game_over', payload:{ scores } });
    // Remettre la room en waiting
    db.from('rooms').update({ status:'waiting' }).eq('code', roomCode);
  }
  setTimeout(() => showPodium(scores), 500);
}

function showPodium(finalScores) {
  clearInterval(timerInterval);
  const overlay = document.getElementById('podium-overlay');
  const grid = document.getElementById('podium-grid');

  // Trier par score
  const sorted = players
    .map(p => ({ ...p, score: finalScores[p.session_id] || 0 }))
    .sort((a,b) => b.score - a.score);

  const RANK_ICONS = ['🥇','🥈','🥉'];
  grid.innerHTML = sorted.slice(0,3).map((p,i) => `
    <div class="podium-card ${i===0?'p1':i===1?'p2':'p3'}" style="animation-delay:${i*0.15}s">
      <div class="podium-rank">${RANK_ICONS[i] || ''}</div>
      <div class="podium-av">${p.avatar}</div>
      <div class="podium-name">${p.pseudo}${p.session_id===mySessionId?' (Toi)':''}</div>
      <div class="podium-score ${i===0?'gold':''}">${p.score} pts</div>
    </div>
  `).join('');

  overlay.classList.add('active');
}

// ───────────────────────────────────────────────
// SCOREBOARD
// ───────────────────────────────────────────────
function renderScoreboard(updatedSession) {
  const maxScore = Math.max(...Object.values(scores), 1);
  const sb = document.getElementById('scoreboard');

  sb.innerHTML = players.map(p => {
    const score = scores[p.session_id] || 0;
    const isMe = p.session_id === mySessionId;
    const isLeading = score === maxScore && score > 0;
    return `
      <div class="score-card ${isMe?'me':''} ${isLeading?'leading':''}" id="sc-${p.session_id.replace(/-/g,'_')}">
        <div class="sc-avatar">${p.avatar}</div>
        <div class="sc-name">${p.pseudo}${isMe?'<span class="me-tag">Toi</span>':''}</div>
        <div class="sc-score" id="score-val-${p.session_id.replace(/-/g,'_')}">${score}</div>
      </div>`;
  }).join('');

  // Flash sur le score mis à jour
  if (updatedSession) {
    const el = document.getElementById(`score-val-${updatedSession.replace(/-/g,'_')}`);
    if (el) { el.classList.remove('flash-up'); void el.offsetWidth; el.classList.add('flash-up'); }
  }
}

// ───────────────────────────────────────────────
// UTILS
// ───────────────────────────────────────────────
function shuffleArray(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show '+type;
  setTimeout(()=>t.className='toast', 2800);
}

function quitGame() {
  clearInterval(timerInterval);
  if (gameChannel) gameChannel.unsubscribe();
  return true;
}

async function replayGame() {
  if (gameChannel) gameChannel.unsubscribe();
  // Remettre room en waiting
  await db.from('rooms').update({ status:'waiting' }).eq('code', roomCode);
  window.location.href = `lobby.html?code=${roomCode}${isHost?'&host=1':''}`;
}

// ───────────────────────────────────────────────
// START
// ───────────────────────────────────────────────
init();
</script>
